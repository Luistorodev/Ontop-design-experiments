<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Token Wallet App - Splash</title>

    <!-- Fonts: General Sans for clean, premium financial look -->
    <link href="https://api.fontshare.com/v2/css?f[]=general-sans@300,400,500,600,700,800&display=swap"
        rel="stylesheet">

    <!-- Phosphor Icons for high-fidelity vector icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="presentation-wrapper">
        <div class="device-frame">
            <div class="app-container splash-container">
                <!-- Video Background -->
                <video class="splash-video" autoplay loop muted playsinline>
                    <source src="assets/vertical.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                
                <!-- Overlay to tint video to match Figma dark mode and ensure text legibility -->
                <div class="splash-overlay"></div>

                <!-- Status Bar Mock - Light Version for Dark Background -->
                <div class="status-bar light">
                    <span class="time">9:41</span>
                    <div class="status-icons">
                        <i class="ph-fill ph-cell-signal-full"></i>
                        <i class="ph-fill ph-wifi-high"></i>
                        <i class="ph-fill ph-battery-full"></i>
                    </div>
                </div>

                <!-- CTA Buttons -->
                <div class="splash-content">
                    <img src="assets/Frase.svg" alt="Frase" class="splash-phrase">
                    <a href="dashboard.html" class="splash-btn splash-btn-secondary">Create an account</a>
                    <a href="dashboard.html" class="splash-btn splash-btn-primary">Log in</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
